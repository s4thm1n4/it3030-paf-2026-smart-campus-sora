spring.application.name=smart-campus-api

# ── PostgreSQL Database ──
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_campus_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── OAuth 2.0 (Google) ──
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ── File Upload Limits ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ── Server ──
server.port=8080

# ── App Custom Config ──
app.cors.allowed-origins=http://localhost:5173
app.jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-in-production}
app.jwt.expiration-ms=86400000
