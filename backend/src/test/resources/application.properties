# ??????????????????????????????????????????????
#  Test profile ? used by GitHub Actions CI
#  Safe to commit ? no real secrets
# ??????????????????????????????????????????????

spring.application.name=smart-campus-api

# ?? In-memory H2 database for tests ??
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ?? OAuth 2.0 (Google) ? dummy values for test ??
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ?? File Upload ??
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ?? Server ??
server.port=8080

# ?? App Config ??
app.cors.allowed-origins=http://localhost:5173
app.jwt.secret=TestJwtSecretKeyForCIOnlyNotForProductionUse123456
app.jwt.expiration-ms=86400000

